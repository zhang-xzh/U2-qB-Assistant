<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>qB 关联助手</title>
    <style>
        :root {
            --primary-color: #3498db;
            --primary-hover: #2980b9;
            --text-color: #2c3e50;
            --border-color: #dcdfe6;
            --error-bg: #fef0f0;
            --error-text: #f56c6c;
            --success-bg: #f0f9eb;
            --success-text: #67c23a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 16px;
            width: 320px;
            margin: 0;
            color: var(--text-color);
            background: #fff;
        }
        .header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header img { width: 20px; height: 20px; }
        .query-box {
            display: flex;
            gap: 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .query-box:focus-within {
            border-color: var(--primary-color);
        }
        .text-input {
            flex: 1;
            padding: 10px 12px;
            border: none;
            outline: none;
            font-size: 13px;
        }
        button {
            padding: 0 16px;
            cursor: pointer;
            border: none;
            background: #f5f7fa;
            color: #606266;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 1px solid var(--border-color);
            white-space: nowrap;
        }
        button:hover {
            background: #eef1f6;
            color: var(--primary-color);
        }
        .status {
            margin-top: 12px;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 4px;
            display: none;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .error { background: var(--error-bg); color: var(--error-text); display: block; border: 1px solid #ffdbdb; }
        .success { background: var(--success-bg); color: var(--success-text); display: block; border: 1px solid #e1f3d8; }
        .footer {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
        }
        .footer a {
            color: #909399;
            font-size: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .footer a:hover { color: var(--primary-color); }
    </style>
</head>
<body>
<div class="header">
    <img src="icon.png" alt="icon">
    <span>qB 关联助手</span>
</div>
<div class="query-box">
    <input id="hash_input" class="text-input" placeholder="输入 Hash 快速打开..." />
    <button id="open_detail">打开</button>
</div>
<div id="status" class="status"></div>
<div class="footer">
    <a href="#" id="go_options">管理数据库...</a>
</div>
<script type="module" src="/src/popup/index.ts"></script>
</body>
</html>
